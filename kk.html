<!DOCTYPE html>

<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鸭王行动</title>
    <style>
        body { margin: 0; padding: 0; background-color: transparent; overflow: hidden; width: 100vw; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; -webkit-user-select: none; }
        #esp_canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999999; }
        #imgui_app { position: fixed; display: block; z-index: 9999999; }
        .imgui-window { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; background-color: rgba(20, 20, 20, 0.92); border: 1px solid rgba(80, 80, 100, 0.7); border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); color: #f0f0f0; font-size: 13px; overflow: hidden; }
        .imgui-titlebar { background: linear-gradient(to bottom, #2c2c35, #1e1e24); padding: 6px 10px; font-weight: bold; color: #e0e0e0; border-bottom: 1px solid rgba(80, 80, 100, 0.7); cursor: move; display: flex; justify-content: space-between; align-items: center; -webkit-user-select: none; }
        .imgui-titlebar .close-btn { background: #a33; border: none; color: white; border-radius: 3px; padding: 1px 8px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .tabs { display: flex; border-bottom: 1px solid rgba(80,80,100,0.5); }
        .tab { flex: 1; padding: 6px 0; text-align: center; font-size: 11px; cursor: pointer; color: #888; background: #1a1a20; }
        .tab.active { color: #fff; background: #2c2c35; }
        .imgui-content { padding: 10px; max-height: 300px; overflow-y: auto; }
        .tab-panel { display: none; }

        .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: #fff; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4A90E2; }
        input:checked + .slider:before { transform: translateX(14px); }

<body>
    <canvas id="esp_canvas"></canvas>
    <div id="imgui_app">
        <div class="imgui-window" id="menu_window">
            <div class="imgui-titlebar" id="menu_header">
                <span>鸭王行动</span>
                <button class="close-btn" id="menu_close">X</button>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="showTab(0)">绘制</div>
                <div class="tab" onclick="showTab(1)">自瞄</div>
            </div>
            <div class="imgui-content" id="menu_body">
                <div class="tab-panel active">
                    <div class="imgui-item"><span>开启绘制</span><label class="switch"><input type="checkbox" id="switch_esp" checked=""><span class="slider"></span></label></div>
                    <div class="imgui-item"><span>显示方框</span><label class="switch"><input type="checkbox" id="switch_box" checked=""><span class="slider"></span></label></div>
                    <div class="imgui-item"><span>显示射线</span><label class="switch"><input type="checkbox" id="switch_line" checked=""><span class="slider"></span></label></div>
                    <div class="imgui-item"><span>显示距离</span><label class="switch"><input type="checkbox" id="switch_hp" checked=""><span class="slider"></span></label></div>
                </div>
                <div class="tab-panel">
                    <div class="imgui-item"><span>开启自瞄</span><label class="switch"><input type="checkbox" id="switch_aimbot"><span class="slider"></span></label></div>
                    <div class="imgui-item"><span>开镜自瞄</span><label class="switch"><input type="checkbox" id="switch_ads"><span class="slider"></span></label></div>
                    <div class="imgui-item" style="flex-direction: column; align-items: flex-start;">
                        <span style="margin-bottom: 5px;">自瞄范围: <span id="fov_val">30</span></span>
                        <input type="range" id="range_fov" min="30" max="300" value="30" style="width: 100%;">
                    </div>
                    <div class="imgui-item" style="flex-direction: column; align-items: flex-start;">
                        <span style="margin-bottom: 5px;">自瞄距离: <span id="dist_val">500</span>m</span>
                        <input type="range" id="range_dist" min="10" max="500" step="10" value="500" style="width: 100%;">
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
let TargetHistory = new Map();
function getPredictedPos(actor, curX, curY, dist) {
    let now = Date.now();
    let hist = TargetHistory.get(actor) || {vx: 0, vy: 0, x: curX, y: curY, t: now};
    let dt = (now - hist.t) / 1000;
    if (dt > 0.05) {
        hist.vx = hist.vx * 0.7 + ((curX - hist.x) / dt) * 0.3;
        hist.vy = hist.vy * 0.7 + ((curY - hist.y) / dt) * 0.3;
        hist.x = curX; hist.y = curY; hist.t = now;
    }
    TargetHistory.set(actor, hist);
    let k = dist * (100 * 0.00001); 
    return { x: curX + (hist.vx * k * 1.0), y: curY + (hist.vy * k * 0.5) };
}

const MenuConfig = { drawEsp: true, drawBox: true, drawLine: true, drawText: true, aimbotEnabled: false, adsEnabled: false, aimbotFov: 30, maxAimDist: 500 };
const HEIGHT_OFFSET_TOP = 0.8, HEIGHT_OFFSET_BOTTOM = 1.0, BEHIND_RAY_LENGTH = 16, ARROW_WING_LEN = 5, ARROW_WING_ANGLE = 0.5;

function showTab(n) {
    document.querySelectorAll('.tab').forEach((t, i) => t.className = i === n ? 'tab active' : 'tab');
    document.querySelectorAll('.tab-panel').forEach((p, i) => p.className = i === n ? 'tab-panel active' : 'tab-panel');
}
const canvas = document.getElementById('esp_canvas'), ctx = canvas.getContext('2d'), iosScale = window.devicePixelRatio;
let sWidth = 0, sHeight = 0, centerX = 0, centerY = 0, lastOrientation = undefined, EntityArray = [], matrix = new Float32Array(16), myX = 0, myY = 0, myZ = 0, totalCount = 0, baseAddr = 0;

let lastIsADS = undefined;
let safetyCooldownFrames = 0;

let cachedListBase = 0;
let cachedA3 = 0;

function getGameBase() {
    if (typeof h5gg === 'undefined') return false;
    let modules = h5gg.getRangesList('Game');
    if (modules.length > 0) { baseAddr = Number(modules[0].start); return true; }
    return false;
}

function updateScreenSize() {
    if (lastOrientation === window.orientation) return;
    lastOrientation = window.orientation;
    if (Math.abs(window.orientation) === 90) { sWidth = window.screen.height; sHeight = window.screen.width; } else { sWidth = window.screen.width; sHeight = window.screen.height; }
    centerX = (sWidth * iosScale) / 2; centerY = (sHeight * iosScale) / 2;
    canvas.width = sWidth * iosScale; canvas.height = sHeight * iosScale;
    if (typeof setWindowRect !== 'undefined') setWindowRect(0, 0, sWidth, sHeight);
}

window.onload = () => {
    updateScreenSize();
    window.addEventListener("orientationchange", updateScreenSize, false);
    initMenuController();
    setInterval(updateEntityList, 1000);
    renderLoop();
};

function initMenuController() {
    const appContainer = document.getElementById('imgui_app'), menu = document.getElementById('menu_window'), header = document.getElementById('menu_header'), closeBtn = document.getElementById('menu_close');
    closeBtn.onclick = (e) => { e.stopPropagation(); appContainer.style.display = 'none'; if (typeof setWindowTouch !== 'undefined') setWindowTouch(false); };
    if (typeof setWindowTouch !== 'undefined') setWindowTouch(true);
    if (typeof setButtonAction !== 'undefined') { setButtonAction(() => { if (appContainer.style.display === 'none') { appContainer.style.display = 'block'; setWindowTouch(true); } else { appContainer.style.display = 'none'; setWindowTouch(false); } }); }
    let isDragging = false, startX, startY, initialLeft, initialTop;
    header.addEventListener('touchstart', (e) => { isDragging = true; const touch = e.touches[0]; if (menu.style.transform !== 'none') { const rect = menu.getBoundingClientRect(); menu.style.left = rect.left + 'px'; menu.style.top = rect.top + 'px'; menu.style.transform = 'none'; } startX = touch.clientX; startY = touch.clientY; initialLeft = menu.offsetLeft; initialTop = menu.offsetTop; }, {passive: true});
    header.addEventListener('touchmove', (e) => { if (!isDragging) return; const touch = e.touches[0]; menu.style.left = Math.max(0, Math.min(window.innerWidth - menu.offsetWidth, initialLeft + (touch.clientX - startX))) + 'px'; menu.style.top = Math.max(0, Math.min(window.innerHeight - menu.offsetHeight, initialTop + (touch.clientY - startY))) + 'px'; }, {passive: true});
    header.addEventListener('touchend', () => { isDragging = false; });
    
    document.getElementById('switch_esp').onchange = function() { MenuConfig.drawEsp = this.checked; };
    document.getElementById('switch_box').onchange = function() { MenuConfig.drawBox = this.checked; };
    document.getElementById('switch_line').onchange = function() { MenuConfig.drawLine = this.checked; };
    document.getElementById('switch_hp').onchange = function() { MenuConfig.drawText = this.checked; };
    
    document.getElementById('switch_aimbot').onchange = function() { 
        MenuConfig.aimbotEnabled = this.checked;
        MenuConfig.adsEnabled = this.checked;
        document.getElementById('switch_ads').checked = this.checked;
    };
    document.getElementById('switch_ads').onchange = function() { 
        MenuConfig.adsEnabled = this.checked; 
    };
    document.getElementById('range_fov').oninput = function() { MenuConfig.aimbotFov = parseInt(this.value); document.getElementById('fov_val').innerText = this.value; };
    document.getElementById('range_dist').oninput = function() { MenuConfig.maxAimDist = parseInt(this.value); document.getElementById('dist_val').innerText = this.value; };
}

function updateEntityList() {
    if (!baseAddr && !getGameBase()) return;
    try {
        if (cachedA3 !== 0) {
            let checkCount = Number(h5gg.getValue(cachedA3 + 104, 'I32'));
            let listBase = Number(h5gg.getValue(cachedA3 + 0xA8, 'I64'));
            
            if (checkCount > 0 && checkCount < 100 && listBase > 0x100000000) {
                totalCount = checkCount;
                let validList = [];
                for (let i = 0; i < 100; i++) {
                    let entryPtr = Number(h5gg.getValue(listBase + (i * 8), 'I64'));
                    if (entryPtr === 0) break;
                    let type = Number(h5gg.getValue(entryPtr + 160, 'I32'));
                    if (type === 65536 || type === 65537) validList.push(entryPtr);
                }
                EntityArray = validList;
                return;
            } else {
                cachedA3 = 0;      
                cachedListBase = 0;
                EntityArray = [];  
            }
        }

        let a1 = Number(h5gg.getValue(baseAddr + 0x6D0CEC0, 'I64')), 
            a2 = a1 ? Number(h5gg.getValue(a1 + 0x10, 'I64')) : 0, 
            a3 = a2 ? Number(h5gg.getValue(a2 + 0x18, 'I64')) : 0;
            
        if (!a3) {
            totalCount = 0;
            EntityArray = [];
            return;
        }
        
        totalCount = Number(h5gg.getValue(a3 + 104, 'I32'));
        
        if (totalCount <= 0 || totalCount >= 100) {
            totalCount = 0;
            EntityArray = [];
            cachedListBase = 0;
            return;
        } else {
            let listBase = Number(h5gg.getValue(a3 + 0xA8, 'I64'));
            if (!listBase || listBase <= 0x100000000) { EntityArray = []; return; }
            
            cachedA3 = a3; 
            cachedListBase = listBase;
            
            let validList = [];
            for (let i = 0; i < 100; i++) {
                let entryPtr = Number(h5gg.getValue(listBase + (i * 8), 'I64'));
                if (entryPtr === 0) break;
                let type = Number(h5gg.getValue(entryPtr + 160, 'I32'));
                if (type === 65536 || type === 65537) validList.push(entryPtr);
            }
            EntityArray = validList;
        }
        
    } catch(e) {
        EntityArray = [];
        cachedListBase = 0; 
        cachedA3 = 0;
        totalCount = 0;
    }
}

function renderLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (totalCount <= 0) {
        EntityArray = [];
        ctx.save(); ctx.shadowBlur = 4 * iosScale; ctx.shadowColor = "rgba(0, 0, 0, 0.8)"; ctx.textAlign = "center";
        ctx.fillStyle = "rgba(255, 255, 255, 0.45)"; ctx.font = (7 * iosScale) + "px sans-serif"; ctx.fillText("本工具仅用于学习交流，禁止售卖，请勿用于非法用途，请使用后于24小时删除，否则后果自负。", centerX, 10 * iosScale);
        ctx.fillStyle = "#00E5FF"; ctx.font = "bold " + (12 * iosScale) + "px sans-serif"; ctx.fillText("鸭王行动", centerX, 24 * iosScale);
        ctx.fillStyle = "#FFF176"; ctx.font = "bold " + (11 * iosScale) + "px Arial"; ctx.fillText("0", centerX, 35 * iosScale);
        ctx.restore();
        
        requestAnimationFrame(renderLoop);
        return; 
    }

    let bestTarget = null, bestBox = null, min3DDist = 999999;
    let currentState = 0;
    
    if (baseAddr) {
        let s1 = Number(h5gg.getValue(baseAddr + 0x6C48600, 'I64')), s2 = s1 ? Number(h5gg.getValue(s1 + 0x40, 'I64')) : 0, s3 = s2 ? Number(h5gg.getValue(s2 + 0x20, 'I64')) : 0;
        currentState = s3 ? Number(h5gg.getValue(s3 + 0x684, 'I32')) : 0;
        let m1 = Number(h5gg.getValue(baseAddr + 0x6C4B300, 'I64'));
        if (m1) { let mBase = m1 + 0x610; for (let i = 0; i < 16; i++) matrix[i] = Number(h5gg.getValue(mBase + (i * 4), 'F32')); }
        let p1 = Number(h5gg.getValue(baseAddr + 0x5E502E0, 'I64'));
        if (p1 > 0) {
            let p2 = Number(h5gg.getValue(p1 + 0x40, 'I64'));
            if (p2 > 0) { let myCoordAddr = p2 + 0x294; myX = Number(h5gg.getValue(myCoordAddr, 'F32')); myY = Number(h5gg.getValue(myCoordAddr + 4, 'F32')); myZ = Number(h5gg.getValue(myCoordAddr + 8, 'F32')); }
        }
        
        ctx.save(); ctx.shadowBlur = 4 * iosScale; ctx.shadowColor = "rgba(0, 0, 0, 0.8)"; ctx.textAlign = "center";
        ctx.fillStyle = "rgba(255, 255, 255, 0.45)"; ctx.font = (7 * iosScale) + "px sans-serif"; ctx.fillText("本工具仅用于学习交流，禁止售卖，请勿用于非法用途，请使用后于24小时删除，否则后果自负。", centerX, 10 * iosScale);
        ctx.fillStyle = "#00E5FF"; ctx.font = "bold " + (12 * iosScale) + "px sans-serif"; ctx.fillText("鸭王行动", centerX, 24 * iosScale);
        ctx.fillStyle = "#FFF176"; ctx.font = "bold " + (11 * iosScale) + "px Arial"; ctx.fillText(totalCount, centerX, 35 * iosScale);
        
        let isADS = (currentState === 16843009 || currentState === 16842753);

        if (lastIsADS !== undefined && lastIsADS !== isADS) {
            safetyCooldownFrames = 30; 
        }
        lastIsADS = isADS;

        if (MenuConfig.aimbotEnabled) {
            ctx.fillStyle = safetyCooldownFrames > 0 ? "#FFEB3B" : (isADS ? "#FF5252" : "#00E676"); 
            ctx.font = "bold " + (11 * iosScale) + "px Arial";
            ctx.fillText(safetyCooldownFrames > 0 ? "缓冲" : (isADS ? "开镜" : "腰射"), centerX, 65 * iosScale);
            ctx.beginPath(); ctx.strokeStyle = "rgba(0, 255, 0, 0.8)"; ctx.lineWidth = 0.5 * iosScale;
            ctx.arc(centerX, centerY, MenuConfig.aimbotFov * iosScale, 0, Math.PI * 2); ctx.stroke();
        }
        ctx.restore();

        let isAimbotActiveState = false;
        if (MenuConfig.aimbotEnabled && safetyCooldownFrames === 0) {
            let canAim = !isADS || (isADS && MenuConfig.adsEnabled);
            if (canAim && (currentState === 65537 || currentState === 65793 || currentState === 16842753 || currentState === 16843009)) {
                let isFiring = isADS || (function(){ try { let ptr1 = Number(h5gg.getValue(baseAddr + 0x6C8B5D8, 'I64')); let ptr2 = ptr1 ? Number(h5gg.getValue(ptr1 + 0xC8, 'I64')) : 0; let ptr3 = ptr2 ? Number(h5gg.getValue(ptr2 + 0x648, 'I64')) : 0; let ptr4 = ptr3 ? Number(h5gg.getValue(ptr3 + 0x0, 'I64')) : 0; return (ptr4 && Number(h5gg.getValue(ptr4 + 0x1D8, 'I32')) === 1); } catch(e){return false;} })();
                if (isFiring) {
                    isAimbotActiveState = true;
                }
            }
        }

        const rayY = 36 * iosScale, M = matrix;
        EntityArray.forEach(actor => {
            let ex = Number(h5gg.getValue(actor + 744, 'F64')), ey = Number(h5gg.getValue(actor + 752, 'F64')), ez = Number(h5gg.getValue(actor + 760, 'F64'));
            if (ex === 0) return;
            let dist = Math.sqrt(Math.pow(myX-ex,2)+Math.pow(myY-ey,2)+Math.pow(myZ-ez,2));
            if (dist < 4) return;

            let withinDrawDistance = dist <= 600;

            let pred = getPredictedPos(actor, ex, ey, dist);
            let targetEx = pred.x, targetEy = pred.y;
            
            let w = ex * M[12] + ey * M[13] + ez * M[14] + M[15];
            if (w < 0.1) {
                if (MenuConfig.drawLine) {
                    let camRightX = M[0], camRightY = M[1], camRightZ = M[2], camForwardX = M[12], camForwardY = M[13], camForwardZ = M[14], camUpX = M[4], camUpY = M[5], camUpZ = M[6];
                    let dirX = ex - myX, dirY = ey - myY, dirZ = ez - myZ;
                    let angle = Math.atan2(dirX * camRightX + dirY * camRightY + dirZ * camRightZ, Math.abs(dirX * camForwardX + dirY * camForwardY + dirZ * camForwardZ) + Math.abs(dirX * camUpX + dirY * camUpY + dirZ * camUpZ) * 0.5);
                    let targetX = centerX + Math.sin(angle) * (BEHIND_RAY_LENGTH * 1.5 * iosScale), targetY = rayY + Math.cos(angle) * (BEHIND_RAY_LENGTH * iosScale);
                    ctx.beginPath(); ctx.strokeStyle = "#FF3D00"; ctx.lineWidth = 0.5 * iosScale; ctx.moveTo(centerX, rayY); ctx.lineTo(targetX, targetY);
                    let arrowAngle = Math.atan2(targetY - rayY, targetX - centerX);
                    ctx.lineTo(targetX - ARROW_WING_LEN * iosScale * Math.cos(arrowAngle - ARROW_WING_ANGLE), targetY - ARROW_WING_LEN * iosScale * Math.sin(arrowAngle - ARROW_WING_ANGLE));
                    ctx.moveTo(targetX, targetY); ctx.lineTo(targetX - ARROW_WING_LEN * iosScale * Math.cos(arrowAngle + ARROW_WING_ANGLE), targetY - ARROW_WING_LEN * iosScale * Math.sin(arrowAngle + ARROW_WING_ANGLE));
                    ctx.stroke();
                }
                return;
            }

            let x_proj = (ex * M[0] + ey * M[1] + ez * M[2] + M[3]);
            let scrX = centerX + (x_proj / w) * centerX, topY = centerY - (ex*M[4] + (ey+HEIGHT_OFFSET_TOP)*M[5] + ez*M[6] + M[7]) / w * centerY, botY = centerY - (ex*M[4] + (ey-HEIGHT_OFFSET_BOTTOM)*M[5] + ez*M[6] + M[7]) / w * centerY;
            let boxH = Math.abs(botY - topY), boxW = boxH * 0.5;
            if (withinDrawDistance && MenuConfig.drawEsp) {
                if (MenuConfig.drawBox) { ctx.strokeStyle = "yellow"; ctx.lineWidth = 1.2 * iosScale; ctx.strokeRect(scrX - boxW/2, topY, boxW, boxH); }
                if (MenuConfig.drawLine) { ctx.beginPath(); ctx.strokeStyle = "rgba(255, 255, 255, 0.4)"; ctx.lineWidth = 0.5 * iosScale; ctx.moveTo(centerX, rayY); ctx.lineTo(scrX, topY); ctx.stroke(); }
                if (MenuConfig.drawText) { ctx.fillStyle = "white"; ctx.font = (10 * iosScale) + "px Arial"; ctx.fillText(Math.floor(dist) + "m", scrX, botY + (12 * iosScale)); }
            }

            if (isAimbotActiveState) {
                let distToCenter = Math.sqrt(Math.pow(scrX - centerX, 2) + Math.pow(topY + boxH/2 - centerY, 2));
                if (dist <= MenuConfig.maxAimDist && distToCenter < MenuConfig.aimbotFov * iosScale && dist < min3DDist) { 
                    min3DDist = dist; 
                    bestTarget = {x: targetEx, y: targetEy, z: ez}; 
                    bestBox = {l: scrX - boxW/2, r: scrX + boxW/2, t: topY, b: botY}; 
                }
            }
        });

        if (isAimbotActiveState && bestTarget) {
            if (!(centerX > bestBox.l && centerX < bestBox.r && centerY > bestBox.t && centerY < bestBox.b)) {
                let dx = bestTarget.x - myX, dy = bestTarget.y - myY, dz = bestTarget.z - myZ, targetDist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                let p1 = Number(h5gg.getValue(baseAddr + 0x6C48218, 'I64')), p2 = p1 ? Number(h5gg.getValue(p1 + 0x138, 'I64')) : 0, p3 = p2 ? Number(h5gg.getValue(p2 + 0x68, 'I64')) : 0;
                if (p3) { 
                    let offset = isADS ? 0x170 : 0x230; 
                    let curM = Math.sqrt(Math.pow(Number(h5gg.getValue(p3 + offset, 'F32')), 2) + Math.pow(Number(h5gg.getValue(p3 + offset + 4, 'F32')), 2) + Math.pow(Number(h5gg.getValue(p3 + offset + 8, 'F32')), 2)); 
                    let scale = curM / targetDist; 
                    h5gg.setValue(p3 + offset, dx * scale, 'F32'); 
                    h5gg.setValue(p3 + offset + 4, dy * scale, 'F32'); 
                    h5gg.setValue(p3 + offset + 8, dz * scale, 'F32'); 
                }
            }
        }

        if (safetyCooldownFrames > 0) {
            safetyCooldownFrames--;
        }
    }
    requestAnimationFrame(renderLoop);
